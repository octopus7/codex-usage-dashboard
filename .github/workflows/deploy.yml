name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: codex-dashboard-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          test -n "${CLOUDFLARE_API_TOKEN:-}" || {
            echo "CLOUDFLARE_API_TOKEN is missing"
            exit 1
          }

          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || {
            echo "CLOUDFLARE_ACCOUNT_ID is missing"
            exit 1
          }

          test -n "${D1_DATABASE_ID:-}" || {
            echo "D1_DATABASE_ID is missing"
            exit 1
          }

      - name: Generate Wrangler configuration
        shell: bash
        run: |
          set -euo pipefail

          sed \
            "s/__D1_DATABASE_ID__/${D1_DATABASE_ID}/g" \
            wrangler.example.jsonc \
            > wrangler.jsonc

          grep -q "\"database_id\": \"${D1_DATABASE_ID}\"" wrangler.jsonc

      - name: Check source
        run: npm run check

      - name: Apply D1 migrations
        run: npm run db:migrate:remote

      - name: Deploy Worker
        run: npm run deploy